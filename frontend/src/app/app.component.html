<div class="app-layout" *ngIf="authService.currentUser$ | async">
  <!-- Sticky Header Toolbar -->
  <mat-toolbar color="primary">
    <span class="logo">
      <mat-icon style="vertical-align:middle; margin-right:6px; font-size:20px; width:20px; height:20px;">fingerprint</mat-icon>
      Elmentore
    </span>
    <div class="user-actions">
      <span class="user-name">{{ (authService.currentUser$ | async)?.name }}</span>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </mat-toolbar>

  <!-- Scrollable Content -->
  <div class="content">
    <router-outlet></router-outlet>
  </div>

  <!-- Bottom Navigation — Reference Style -->
  <nav class="bottom-nav">
    <!-- ADMIN tabs: Home / Sessions / Users / Admin -->
    <ng-container *ngIf="authService.isAdmin()">
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a routerLink="/admin/sessions" routerLinkActive="active">
        <mat-icon>event_note</mat-icon>
        <span>Sessions</span>
      </a>
      <a routerLink="/admin/users" routerLinkActive="active">
        <mat-icon>group</mat-icon>
        <span>Users</span>
      </a>
      <a routerLink="/admin/reports" routerLinkActive="active">
        <mat-icon>bar_chart</mat-icon>
        <span>Reports</span>
      </a>
    </ng-container>

    <!-- EMPLOYEE tabs: Home / History / Records (Check-In) / -->
    <ng-container *ngIf="!authService.isAdmin()">
      <a routerLink="/employee/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a routerLink="/employee/my-attendance" routerLinkActive="active">
        <mat-icon>history</mat-icon>
        <span>History</span>
      </a>
      <a routerLink="/employee/mark-attendance" routerLinkActive="active">
        <mat-icon>fingerprint</mat-icon>
        <span>Check-In</span>
      </a>
    </ng-container>
  </nav>
</div>

<!-- Guest / Auth pages — no nav or toolbar -->
<div *ngIf="!(authService.currentUser$ | async)" class="content-guest">
  <router-outlet></router-outlet>
</div>
