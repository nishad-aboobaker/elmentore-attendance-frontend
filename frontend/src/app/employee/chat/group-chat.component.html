<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-content">
      <mat-icon>forum</mat-icon>
      <div class="header-text">
        <h2>Global Chat</h2>
        <span>Company-wide discussion</span>
      </div>
    </div>
  </div>

  <!-- Messages List -->
  <div class="chat-messages" #scrollMe>
    <div class="message-wrapper" 
         *ngFor="let msg of messages"
         [ngClass]="{'mine': msg.sender._id === currentUserId, 'others': msg.sender._id !== currentUserId}">
      
      <div class="message-avatar" *ngIf="msg.sender._id !== currentUserId">
        {{ msg.sender.name.charAt(0) | uppercase }}
      </div>
      
      <div class="message-content">
        <div class="message-author" *ngIf="msg.sender._id !== currentUserId">
          {{ msg.sender.name }} <span class="author-dept" *ngIf="msg.sender.department">&bull; {{ msg.sender.department }}</span>
        </div>
        <div class="message-bubble">
          {{ msg.content }}
        </div>
        <div class="message-time">
          {{ msg.createdAt | date:'shortTime' }}
        </div>
      </div>
      
    </div>
    <div *ngIf="messages.length === 0" class="empty-chat">
      <mat-icon>chat_bubble_outline</mat-icon>
      <p>No messages yet. Start the conversation!</p>
    </div>
  </div>

  <!-- Input Area -->
  <div class="chat-input-area">
    <input type="text" 
           [(ngModel)]="newMessage" 
           (keyup.enter)="sendMessage()" 
           placeholder="Type a message..."
           class="chat-input-field">
    <button mat-icon-button color="primary" class="send-btn" (click)="sendMessage()" [disabled]="!newMessage.trim()">
      <mat-icon>send</mat-icon>
    </button>
  </div>
</div>
